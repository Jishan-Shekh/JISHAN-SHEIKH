<svg width="160" height="160" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00f5ff"></stop>
      <stop offset="50%" stop-color="#3b82f6"></stop>
      <stop offset="100%" stop-color="#a855f7"></stop>
    </linearGradient>

    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="blur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer dynamic shape -->
  <path d="M80 10
           C120 10, 150 40, 150 80
           C150 120, 120 150, 80 150
           C40 150, 10 120, 10 80
           C10 40, 40 10, 80 10Z" fill="none" stroke="url(#brand)" stroke-width="3" filter="url(#softGlow)"></path>

  <!-- Inner abstract symbol (J + tech curve fusion) -->
  <path d="M95 40
           C95 70, 95 95, 75 105
           C60 112, 50 105, 50 92" fill="none" stroke="url(#brand)" stroke-width="5" stroke-linecap="round" filter="url(#softGlow)"></path>

  <!-- Dot accent -->
  <circle cx="95" cy="35" r="4" fill="#00f5ff"></circle>

</svg>